<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sewa Mmobil - Platform Rental Terpercaya{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9fbfd;
            color: #2d3748;
        }
        .navbar {
            background-color: #1a202c !important;
            backdrop-filter: blur(10px);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        .nav-link {
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }
        .nav-link:hover {
            color: #ffc107 !important;
        }
        .btn-custom-warning {
            background-color: #ffc107;
            color: #1a202c;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 20px;
            transition: all 0.3s ease;
        }
        .btn-custom-warning:hover {
            background-color: #e0a800;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.2);
        }
        footer {
            background-color: #1a202c;
            color: #a0aec0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand text-warning" href="{% url 'katalog' %}">
                🚗 SEWA MMOBIL
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link text-white-50 px-2" href="{% url 'katalog' %}">Katalog Armada</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-custom-warning btn-sm" href="{% url 'guestbook' %}">
                            📖 Digital Guestbook
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5" style="min-height: 80vh;">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="py-4 border-top border-secondary mt-auto">
        <div class="container text-center">
           <p class="mb-1 fw-semibold">&copy; 2026 Sewa Mmobil Platform.</p>
            <small class="text-muted">Dibuat menggunakan arsitektur Django Django MVT & Bootstrap 5</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
